const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('msg');
const replayBtn = document.getElementById('replay');

const allPoints = regions.flatMap(r => r.contour);
const minX = Math.min(...allPoints.map(p => p[0]));
const maxX = Math.max(...allPoints.map(p => p[0]));
const minY = Math.min(...allPoints.map(p => p[1]));
const maxY = Math.max(...allPoints.map(p => p[1]));

const w = maxX - minX;
const h = maxY - minY;
const scale = Math.min(700 / w, 700 / h);
const cx = (minX + maxX) / 2;
const cy = (minY + maxY) / 2;

function project(p) {
  return [
    (p[0] - cx) * scale + 400,
    (p[1] - cy) * scale + 400
  ];
}

let i = 0;

function drawRegion(region) {
  const pts = region.contour.map(project);
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (const p of pts.slice(1)) {
    ctx.lineTo(p[0], p[1]);
  }
  ctx.closePath();
  ctx.fillStyle = `rgb(${region.color[0]}, ${region.color[1]}, ${region.color[2]})`;
  ctx.fill();
}

function animate() {
  if (i >= regions.length) {
    msg.classList.add('show');
    replayBtn.classList.add('show');
    return;
  }
  // dibujar varias regiones por frame para que no tarde una eternidad
  const perFrame = 3;
  for (let k = 0; k < perFrame && i < regions.length; k++, i++) {
    drawRegion(regions[i]);
  }
  requestAnimationFrame(animate);
}

function start() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  msg.classList.remove('show');
  replayBtn.classList.remove('show');
  i = 0;
  animate();
}

replayBtn.addEventListener('click', start);
start();
